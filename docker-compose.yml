services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devbrain-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devbrain}
      POSTGRES_DB: ${POSTGRES_DB:-devbrain}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-devbrain} -d ${POSTGRES_DB:-devbrain}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: devbrain-redis
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  migrate:
    image: ${REGISTRY:-}${IMAGE_PREFIX:-devbrain/}api:${IMAGE_TAG:-latest}
    container_name: devbrain-migrate
    command: ['npx', 'prisma', 'migrate', 'deploy']
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://devbrain:devbrain@postgres:5432/devbrain}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: 'no'

  api:
    image: ${REGISTRY:-}${IMAGE_PREFIX:-devbrain/}api:${IMAGE_TAG:-latest}
    container_name: devbrain-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://devbrain:devbrain@postgres:5432/devbrain}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      API_PORT: '3001'
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - '${API_PORT:-3001}:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - web
      - internal
    restart: unless-stopped

  web:
    image: ${REGISTRY:-}${IMAGE_PREFIX:-devbrain/}web:${IMAGE_TAG:-latest}
    container_name: devbrain-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - '${WEB_PORT:-3000}:3000'
    depends_on:
      - api
    networks:
      - web
    restart: unless-stopped

  worker:
    image: ${REGISTRY:-}${IMAGE_PREFIX:-devbrain/}worker:${IMAGE_TAG:-latest}
    container_name: devbrain-worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://devbrain:devbrain@postgres:5432/devbrain}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  backup:
    image: ${REGISTRY:-}${IMAGE_PREFIX:-devbrain/}backup:${IMAGE_TAG:-latest}
    container_name: devbrain-backup
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devbrain}
      POSTGRES_DB: ${POSTGRES_DB:-devbrain}
      POSTGRES_HOST: postgres
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-}
      BETTERSTACK_HEARTBEAT_URL: ${BETTERSTACK_HEARTBEAT_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: devbrain-caddy
    ports:
      - '${CADDY_HTTP_PORT:-80}:80'
      - '${CADDY_HTTPS_PORT:-443}:443'
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
    depends_on:
      - web
      - api
    networks:
      - web
    restart: unless-stopped

networks:
  web:
    driver: bridge
  internal:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  caddydata:
